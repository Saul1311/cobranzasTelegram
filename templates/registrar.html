<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>🧾 Registrar Cliente</title>
  <link rel="stylesheet" href="/static/style.css"/>
  <style>
    .row-actions{display:flex; gap:12px; flex-wrap:wrap; align-items:center; justify-content:space-between; margin-bottom:10px;}
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px;margin-top:12px;}
    .field{
      grid-column: span 6;
      display:flex;flex-direction:column;gap:7px;
      padding:12px;border-radius:16px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.18);
    }
    .field.full{grid-column: span 12;}
    .field.third{grid-column: span 4;}
    .field.quarter{grid-column: span 3;}
    label{font-size:12px;color:rgba(234,240,255,.78)}
    input, select{
      padding:11px 12px;border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(9,14,30,.55);
      color: var(--text); outline:none; font-size:13px;
    }
    input:focus, select:focus{
      border-color: rgba(34,211,238,.45);
      box-shadow: 0 0 0 3px rgba(34,211,238,.12);
    }
    .hint{font-size:12px;color:rgba(234,240,255,.65)}
    .days-row{display:flex;gap:10px;flex-wrap:wrap;}
    .days-row > *{flex:1}
    @media(max-width:900px){
      .field{grid-column:span 12;}
      .field.third,.field.quarter{grid-column:span 12;}
    }
  </style>
</head>
<body>
  <div class="gridlines"></div>
  <div class="wrap">
    <h1>🧾 REGISTRAR CLIENTE</h1>
    <p class="sub">Si escribes días exactos, se usa ese número. Si no, se usa el select.</p>

    <div class="panel">
      <div class="row-actions">
        <a class="btn back" href="/">← Volver</a>
        <button class="btn save" type="submit" form="frm">💾 Guardar Registro</button>
      </div>

      <form id="frm" method="post" action="/registrar">
        <div class="grid">

          <div class="field full">
            <label>Nombre cliente</label>
            <input name="nombre_cliente" placeholder="Ej: Juan Pérez" required>
          </div>

          <div class="field">
            <label>Poner el @ del Cliente (si no tiene, déjalo vacío)</label>
            <input name="tiene_arroba" placeholder="@usuario">
          </div>

          <div class="field">
            <label>ID_CLIENTE</label>
            <input name="id_cliente" placeholder="Ej: 7151860510">
          </div>

          <div class="field">
            <label>ID (telegram u otro)</label>
            <input name="id_telegram" placeholder="Ej: 7151860510">
          </div>

          <div class="field">
            <label>Correo</label>
            <input name="correo" placeholder="correo@gmail.com">
          </div>

          <div class="field">
            <label>Contraseña</label>
            <input name="contrasena" placeholder="contraseña">
          </div>

          <div class="field third">
            <label>Fecha inicio (dd/mm/yyyy)</label>
            <input id="fecha_inicio" name="fecha_inicio" placeholder="03/03/2026">
            <div class="hint">Al cambiar fecha o días, se calcula fecha corte.</div>
          </div>

          <div class="field third">
            <label>Días de servicio</label>
            <div class="days-row">
              <select id="dias_servicio_select">
                <option value="30" selected>30 días</option>
                <option value="28">28 días</option>
                <option value="15">15 días</option>
                <option value="7">7 días</option>
                <option value="90">90 días</option>
              </select>
              <input id="dias_custom" type="number" min="1" placeholder="Días exactos (ej: 43)">
            </div>
            <div class="hint">Regla: inicio + (días - 1) → fecha corte.</div>
          </div>

          <div class="field third">
            <label>Fecha corte (dd/mm/yyyy)</label>
            <input id="fecha_corte" name="fecha_corte" placeholder="02/04/2026" readonly>
            <div class="hint">Se llena automáticamente.</div>
          </div>

          <div class="field full">
            <label>Servicio otorgado</label>
            <input name="servicio_otorgado" placeholder="Ej: BOT DE DOXEO" required>
          </div>

          <div class="field quarter">
            <label>Dispositivos</label>
            <input name="dispositivos" placeholder="Ej: 1">
          </div>

          <div class="field quarter">
            <label>Perfil (opcional)</label>
            <input name="perfil_cuenta" placeholder="Ej: Perfil 1">
          </div>

          <div class="field quarter">
            <label>PIN (opcional)</label>
            <input name="pin_cuenta" placeholder="Ej: 1234">
          </div>

          <div class="field quarter">
            <label>Monto pagado</label>
            <input name="monto_pagado" placeholder="Ej: 35" required>
          </div>

        </div>
      </form>
    </div>
  </div>

  <script>
    function parseDMY(str){
      const s = (str || "").trim();
      const m = s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
      if(!m) return null;
      const dd = parseInt(m[1],10);
      const mm = parseInt(m[2],10)-1;
      const yy = parseInt(m[3],10);
      const d = new Date(yy, mm, dd);
      if(d.getFullYear() !== yy || d.getMonth() !== mm || d.getDate() !== dd) return null;
      return d;
    }
    function formatDMY(date){
      const dd = String(date.getDate()).padStart(2,'0');
      const mm = String(date.getMonth()+1).padStart(2,'0');
      const yy = date.getFullYear();
      return `${dd}/${mm}/${yy}`;
    }
    function getDias(){
      const custom = parseInt(document.getElementById("dias_custom").value, 10);
      if(custom && custom > 0) return custom;
      return parseInt(document.getElementById("dias_servicio_select").value, 10);
    }
    function updateFechaCorte(){
      const inicioStr = document.getElementById("fecha_inicio").value;
      const dias = getDias();
      const inicio = parseDMY(inicioStr);
      const corteInput = document.getElementById("fecha_corte");

      if(!inicio || !dias || dias <= 0){
        corteInput.value = "";
        return;
      }
      const corte = new Date(inicio);
      corte.setDate(corte.getDate() + (dias - 1));
      corteInput.value = formatDMY(corte);
    }
    document.getElementById("fecha_inicio").addEventListener("input", updateFechaCorte);
    document.getElementById("dias_servicio_select").addEventListener("change", updateFechaCorte);
    document.getElementById("dias_custom").addEventListener("input", updateFechaCorte);
  </script>
</body>
</html>
